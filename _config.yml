  <br>
  <section>
    <h2>Philosophy</h2>
<p>
  I believe in the hacker ethos: curiosity, persistence, and responsible disclosure. Security isn't just 
  about breaking things — it's about understanding systems deeply enough to make them better. My goal is 
  to contribute to both the offensive security industry and academic research, helping train the next 
  generation while pushing the boundaries of what's possible.
</p>
  </section>
