more_content: | # this will include new lines to allow paragraphs
  
  I'm Dilanka Kaushal Hewage holding an MSc in Cybersecurity from IU International University of Applied Sciences, Germany, 
  and a bachelor's degree from Singhania University. My academic passions encompass cutting-edge research at the 
  intersection of artificial intelligence and cybersecurity; particularly, methods that enhance reasoning capabilities 
  in large language models for security applications.<br>
  
  During my postgraduate studies, I developed a deep interest in how LLMs can be architecturally enhanced to perform 
  complex reasoning tasks, especially in code generation and security analysis contexts. This led me to explore novel 
  approaches involving deep-think stages with self-reflection and direct integration of thought processes into LLM 
  hidden states through model surgery techniques. These explorations formed the foundation of my LLM Reasoning Framework, 
  which enables various LLMs to achieve improved reasoning without requiring fine-tuning.<br>
  Following the outstanding research published by leading AI security labs and tech companies, I have acquired comprehensive 
  knowledge of current challenges in LLM security, adversarial robustness, and automated vulnerability detection. 
  With an avid interest in both theoretical foundations and practical implementations, I've gained extensive hands-on 
  experience with modern machine learning frameworks, transformer architectures, and optimization techniques relevant to 
  building secure and robust AI systems.<br>
