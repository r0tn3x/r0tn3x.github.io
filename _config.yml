about_content: | # this will include new lines to allow paragraphs
  
  <section>
    <h2>About</h2>
  <p>
  I received my MSc in Cybersecurity at the <a href="https://www.iu.org/">IU International University of Applied Sciences</a> in Germany. Previously, I obtained my
  bachelor's degree from <a href="https://singhaniauniversity.ac.in/">Singhania University</a>. During my postgraduate studies,
  I was working on reasoning in LLMs for code generation and LLM-related cybersecurity; as a result, I developed a new approach for guiding the
  generation process. It consisted of a separate deep-think stage with self-reflection and
  a direct integration of thoughts (hidden states) into the LLM's main generation's hidden states using model surgery!
  This framework called <a href="https://github.com/r0tn3x/llm-reasoning-framework">LLM Reasoning Framework</a> is applicable to various LLMs without
  finetuning. As an extension, It has a thought memory manager which controls the memories and thoughts of the LLM
  (not included in the evaluations) which allows the integration of approaches like Neural Turing Machines or DNC and LLMs.</p>
  </section>
  
  <br>
  <section>
    <h2>Research Interests</h2>
    <p>
    My research focuses on the intersection of artificial intelligence and cybersecurity, particularly exploring how 
    advanced reasoning capabilities in LLMs can be leveraged for security applications and threat detection.
    </p>
    
    <p>
    A major challenge in current AI models is their struggle with generalization, consistent logical reasoning, and decision-making,
    especially in cybersecurity scenarios that require multi-step inference, vulnerability analysis, or handling previously 
    unseen attack patterns. Current models (i.e., LLMs) can generate highly semantically coherent text, yet often fail in 
    robust reasoning abilities necessary for tasks such as complex threat analysis, security planning, or adapting to novel 
    cyber threats.
    </p>
    
    <p>
    Researchers have explored many approaches such as prompt engineering methods (e.g., CoT and self-reflection), which 
    can enhance reasoning abilities to an extent as a temporary and short-term solution; however, they are limited 
    and are not architecturally native to the models. 
    Therefore, my research focuses on developing <strong>differentiable approaches for implementing iterative reasoning</strong> and
    decision-making for LLM-powered security systems and autonomous threat detection agents.
    This involves developing new architectures that can maintain coherent thought processes across multiple inference steps 
    in security-critical contexts.<br>
    </p>
    
    <p>Currently, I am exploring how advanced reasoning frameworks can improve LLM performance in code generation, 
    vulnerability detection, and automated security analysis. My work involves integrating deep-think stages with 
    self-reflection mechanisms and direct thought integration through model surgery techniques, enabling LLMs to reason 
    more effectively about security problems without requiring extensive fine-tuning.</p>
    
    <p>
    In a wider context, I am fascinated by the idea of developing intelligent security systems that combine specialized 
    capabilities such as threat memory and rapid learning, goal-driven defense planning, anomaly detection, and error 
    monitoring that operate collaboratively to make informed security decisions within complex environments. I am interested 
    in transformers and attention mechanisms with applications in security contexts: adversarial robustness, 
    multimodal threat detection, and self-supervised learning for zero-day vulnerability discovery.
    </p>
    <br><br>
    <section>
  <h2>Research Highlights</h2>
    <ul>
        <li><strong>LLM Security and Reasoning</strong>: Developing advanced reasoning frameworks for LLMs in cybersecurity applications</li> 
        <li><strong>Automated Threat Detection</strong>: Leveraging deep learning for vulnerability analysis and security code generation</li>
        <li><strong>Model Surgery and Architecture Innovation</strong>: Direct integration of thought processes into LLM hidden states without fine-tuning</li>
        <li><strong>AI-Powered Security Systems</strong>: Building intelligent agents for autonomous threat detection and response</li>
    </ul>
  </section>
