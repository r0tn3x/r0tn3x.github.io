  <section>
    <h2>Open Source & Community</h2>
<p>
  I maintain a blog at <a href="https://n0p5l1d3r.github.io/">n0p5l1d3r.github.io</a> where I share writeups, 
  research, and technical deep-dives. I also contribute to open-source security tools and participate in 
