<section>
    <h2>About</h2>
    <p>
      Welcome to my corner of the internet. I'm <strong>Dilanka Kaushal Hewage</strong> — you might know me as 
      <strong>r0tn3x</strong>. This page was last updated in late 2025, and I'll try to keep it current as things evolve.
    </p>
<p>
  I'm an Offensive Security Engineer and researcher based in Dubai, UAE, with a passion for breaking things 
  (legally), reverse engineering malware, and pushing the boundaries of what's possible in offensive security. 
  For the past four years, I've been working at <a href="https://www.dha.gov.ae/">Dubai Health Authority</a> 
  as a Senior Application Security Engineer, where I conduct red team operations, penetration testing, and 
  malware analysis to protect critical healthcare infrastructure.
</p>

<p>
  Before DHA, I spent time at AIX Investment Group working on blockchain security and cryptocurrency platform 
  assessments, and before that, I cut my teeth at the Department of Defense in Sri Lanka, where I received 
  some of the best red teaming training available and worked alongside nation-state-level teams.
</p>

<p>
  I hold a <strong>B.Sc. in Computer Science</strong> from Singhania University (CGPA: 8.14/10.0). Currently, 
  I'm pursuing my <strong>M.Sc. in Computer Science</strong> at IU University, with plans to transition into 
  academia. My long-term goal is to become a professor or senior lecturer, bridging the gap between practical 
  offensive security and academic research.
</p>
  </section>
  <br>
  <section>
    <h2>What I Do</h2>
<p>My work revolves around:</p>

<ul>
  <li><strong>Red Teaming & Adversary Emulation</strong> — simulating APT tactics to test organizational defenses</li>
  <li><strong>Binary Exploitation & Reverse Engineering</strong> — my absolute favorite. Give me IDA Pro, a binary, and some coffee, and I'm happy</li>
  <li><strong>Malware Analysis & Development</strong> — dissecting malicious code and building custom offensive tools</li>
  <li><strong>Penetration Testing</strong> — web apps, APIs, networks, cloud infrastructure, IoT devices, you name it</li>
  <li><strong>Active Directory Attacks</strong> — privilege escalation, lateral movement, domain dominance</li>
  <li><strong>C2 Framework Operations</strong> — Cobalt Strike, Brute Ratel (BRC4), PoshC2, Empire, and custom implants</li>
</ul>
  </section>
  <br>
  <section>
    <h2>Research Interests</h2>
<p>
  I'm deeply interested in the intersection of <strong>offensive security and AI/ML</strong>. Specifically:
</p>

<ul>
  <li>How machine learning can be weaponized in offensive operations</li>
  <li>Adversarial machine learning and model exploitation</li>
  <li>AI-powered red teaming and automated exploit generation</li>
  <li>Defensive AI and detection mechanisms</li>
</ul>

<p>
  I also maintain an active research focus on <strong>zero-day discovery, exploit development, and advanced 
  evasion techniques</strong>.
</p>
  </section>
  <br>
